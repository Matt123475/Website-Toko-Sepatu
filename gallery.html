<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - StepWise</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
        }

        nav{
            background: #111;
            color: white;
            display: flex;
            padding: 20px 0;
            flex-direction: column;
            align-items: center;
        }

        .logo-container{
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .logo-container img{
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-container h1{
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px;
            letter-spacing: 2px;
        }

        nav ul{
            list-style: none;
            display: flex;
            gap: 25px;
            padding: 0;
            margin: 0;
        }

        nav a{
            color: white;
            text-decoration: none;
            transition: 0.3s;
            padding: 6px 12px;
            border-radius: 8px;
        }

        nav a:hover{
            background: white;
            color: black;
        }

        nav a.active{
            background: white;
            color: black;
        }

        .gallery-section{
            text-align: center;
            padding: 70px 20px;
            background: white;
        }

        .gallery-section h2{
            font-size: 46px;
            margin-bottom: 15px;
        }

        .gallery-section h2::after{
            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: #d4af37;
            margin: 15px auto 0;
            border-radius: 10px;
        }

        .gallery-section p{
            color: #666;
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .gallery-container{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .gallery-container img{
            width: 350px;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: 0.4s;
        }

        .gallery-container img:hover{
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        footer{
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 25px;
            margin-top: 60px;
            font-size: 14px;
        }

        @media (max-width: 768px){

            nav ul{
                flex-direction: column;
                gap: 12px;
            }

            .logo-container h1{
                font-size: 30px;
            }

            .gallery-section{
                padding: 50px 20px;
            }

            .gallery-section h2{
                font-size: 34px;
            }

            .gallery-section p{
                font-size: 15px;
            }

            .gallery-container img{
                width: 100%;
                height: auto;
            }

        }

    </style>

</head>
<body>

    <nav>

        <div class="logo-container">
            <img src="img/LogoPicture.png">
            <h1>StepWise</h1>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Project.html">Product</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a class="active" href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

    <section class="gallery-section">

        <h2>Gallery</h2>

        <p>
            Explore our stylish sneaker collection and store atmosphere.
        </p>

        <div class="gallery-container">

            <img src="img/gallery1.png">

            <img src="img/gallery2.png">

            <img src="img/gallery3.png">

            <img src="img/gallery4.png">

            <img src="img/gallery5.png">

            <img src="img/gallery6.png">

        </div>

    </section>

    <footer>
        <p>© 2026 StepWise. All Rights Reserved.</p>
    </footer>

</body>
</html>
