<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - StepWise</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
        }

        nav{
            background: #111;
            color: white;
            display: flex;
            padding: 20px 0;
            flex-direction: column;
            align-items: center;
        }

        .logo-container{
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .logo-container img{
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo-container h1{
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px;
            letter-spacing: 2px;
        }

        nav ul{
            list-style: none;
            display: flex;
            gap: 25px;
            padding: 0;
            margin: 0;
        }

        nav a{
            color: white;
            text-decoration: none;
            transition: 0.3s;
            padding: 6px 12px;
            border-radius: 8px;
        }

        nav a:hover{
            background: white;
            color: black;
        }

        nav a.active{
            background: white;
            color: black;
        }

        .contact-section{
            text-align: center;
            padding: 70px 20px;
            background: white;
        }

        .contact-section h2{
            font-size: 46px;
            margin-bottom: 15px;
        }

        .contact-section h2::after{
            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: #d4af37;
            margin: 15px auto 0;
            border-radius: 10px;
        }

        .contact-section p{
            color: #666;
            margin-top: 25px;
            margin-bottom: 50px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .contact-box{
            background: white;
            width: 550px;
            max-width: 95%;
            margin: auto;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border: 1px solid #e5e5e5;
        }

        .contact-box input,
        .contact-box textarea{
            width: 100%;
            padding: 16px;
            margin-top: 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
            outline: none;
        }

        .contact-box input:focus,
        .contact-box textarea:focus{
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212,175,55,0.2);
        }

        .contact-box textarea{
            height: 160px;
            resize: none;
        }

        .contact-box button{
            margin-top: 25px;
            padding: 14px 30px;
            border: 1px solid #d4af37;
            border-radius: 50px;
            background: linear-gradient(135deg, #111, #2a2a2a);
            color: #d4af37;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-box button:hover{
            background: #d4af37;
            color: #111;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212,175,55,0.3);
        }

        footer{
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 25px;
            margin-top: 60px;
            font-size: 14px;
        }


        @media (max-width: 768px){

            nav ul{
                flex-direction: column;
                gap: 12px;
            }

            .logo-container h1{
                font-size: 30px;
            }

            .contact-section{
                padding: 50px 20px;
            }

            .contact-section h2{
                font-size: 34px;
            }

            .contact-section p{
                font-size: 15px;
            }

            .contact-box{
                padding: 25px;
            }

        }

    </style>

</head>
<body>

    <nav>

        <div class="logo-container">
            <img src="img/LogoPicture.png">
            <h1>StepWise</h1>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Project.html">Product</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
        </ul>

    </nav>

    <section class="contact-section">

        <h2>Contact Us</h2>

        <p>
            Feel free to contact StepWise for more information.
        </p>

        <div class="contact-box">

            <form action="https://formsubmit.co/matthew.setyabudi@gmail.com" method="POST">

                <input type="text" name="name" placeholder="Your Name" required>

                <input type="email" name="email" placeholder="Your Email" required>

                <textarea name="message" placeholder="Your Message" required></textarea>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <footer>
        <p>© 2026 StepWise. All Rights Reserved.</p>
    </footer>

</body>
</html>
